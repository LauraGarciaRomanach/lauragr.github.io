# WhatATheme
markdown: kramdown

# URL of the Site
url: 'https://lauragarciaromanach.github.io/WhatATheme'
# Base URL of the Site (i.e., Name of the Repository in which the Site is hosted)
baseurl: 

# Title of the Site
title: Laura García Romañach
# Description of the Site
description: Plant Biology PhD | Science Communication
# URL of Image of the Site
site-image: /WhatATheme/assets/images/meta.jpg
# Keywords of the Sitez
site-keywords: Site, Template, Theme
# URL for the Image of custom Favicon
favicon-url: 

# URL of the Image of Custom Hero Image (i.e., the image in the background of the very first section of the Homepage)
heroimage: "/assets/images/leaf.jpg"

# Social Media and Contact
# If you don't want to use any icon, you can leave them blank.
email: laura.garcia@slu.se
facebook_username: 
twitter_username: 
instagram_username: 
linkedin_username: laura-garcía-romañach-764134183
github_username: LauraGarciaRomanach
youtube_channel_id: 
reddit_username: 
behance_username: 
dribbble_username: 
spotify_username: 

# Google Analytics
# google-analytics: UA-163806439-1

# Disqus
# disqus-shortname: thedevslot

# Name of the Author
author-name: Laura García Romañach
# URL for the Image of the Author
author-image: '/assets/images/Laura_cropped.jpg'
# 60 Words About the Author
author-about: I’m a PhD student in Plant Biology passionate about making science engaging and accessible. I enjoy visual storytelling, public speaking, and science outreach.
# URL to the Author's Profile (i.e., Github, Twitter, Stackoverflow, etc)
author-url: https://github.com/LauraGarciaRomanach

# SASS
sass:
  sass_dir: _sass
  style: compressed

# Build settings
plugins:
  - jekyll-admin
  - jekyll-feed

# Permalink
permalink: "blog/:title"

# Compress
compress_html:
  clippings: all

# Defaults
defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ""
      description: ""
      tags:
        - ""
  -
    scope:
      type: 'pages'
    values:
      layout: page

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
